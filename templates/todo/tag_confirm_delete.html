{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <h2>Confirm Deletion</h2>
    <p>Are you sure you want to delete the "{{ object.name }}" tag?</p>
    
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Yes, delete</button>
        <a href="{% url 'todo:tag-list' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
