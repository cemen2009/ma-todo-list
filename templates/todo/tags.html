{% extends 'base.html' %}
{% block title %}Tags{% endblock %}

{% block content %}
<h2>Tags</h2>
<a href="{% url 'todo:tag-add' %}" class="btn btn-primary mb-3">Add Tag</a>

<table class="table table-bordered">
    <thead>
        <tr>
            <th>Name</th>
            <th>Update</th>
            <th>Delete</th>
        </tr>
    </thead>
    <tbody>
        {% for tag in tags %}
            <tr>
                <td>{{ tag.name }}</td>
                <td><a href="{% url 'todo:tag-update' tag.pk %}" class="btn btn-secondary">Update</a></td>
                <td><a href="{% url 'todo:tag-delete' tag.pk %}" class="btn btn-danger">Delete</a></td>
            </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
